# PER-ST-Vim-SAC algorithm-specific parameters
ent_coef: 0.2
target_entropy: auto
target_update_interval: 1
policy_freq: 2

# Prioritized replay parameters.
dper_alpha: 0.6
dper_beta0: 0.4
dper_beta1: 1.0
dper_eps: 0.000001
dper_success_capacity_ratio: 0.3
dper_success_sample_ratio: 0.5
dper_mu_low: 0.30
dper_mu_mid: 0.45
dper_mu_high: 0.60
dper_mu_step1: 0.25
dper_mu_step2: 0.65

# Vim + temporal Mamba visual encoder parameters, matching ST_Vim_TD3.
st_mamba_embed_dim: 64
st_mamba_depth: 1
st_mamba_patch_size: 32
st_mamba_d_state: 32
st_mamba_d_conv: 4
st_mamba_expand: 2
st_mamba_drop_rate: 0.05
st_mamba_drop_path_rate: 0.05
st_mamba_temporal_depth: 1
st_vim_concat_cls_before_temporal_mamba: false
st_vim_flatten_all_tokens: true
