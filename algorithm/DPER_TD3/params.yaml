# PER_TD3 algorithm-specific parameters
# Shared/common parameters stay in config.py
dper_td3_success_capacity_ratio: 0.3  # PER 双池中成功样本池容量占比
dper_td3_alpha: 0.6  # PER 优先级指数 alpha
dper_td3_priority_eps: 0.000001  # PER 优先级平滑项 eps
dper_td3_beta_start: 0.4  # PER 重要性采样 beta 起始值
dper_td3_beta_final: 1.0  # PER 重要性采样 beta 结束值
dper_td3_mu_low: 0.30  # 成功样本采样比例 mu 早期值
dper_td3_mu_mid: 0.45  # 成功样本采样比例 mu 中期值
dper_td3_mu_high: 0.60  # 成功样本采样比例 mu 后期值
dper_td3_mu_step1: 0.25  # mu 从 low 切到 mid 的训练进度阈值
dper_td3_mu_step2: 0.65  # mu 从 mid 切到 high 的训练进度阈值
