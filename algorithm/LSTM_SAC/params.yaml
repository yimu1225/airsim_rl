# LSTM-SAC parameters following Liu Bokai et al.:
# self-supervised attention depth feature extractor + FC512/LSTM512/FC512 SAC.
ent_coef: 'auto'
alpha_lr: 8e-5  # alpha/entropy coefficient optimizer learning rate
target_entropy: auto
target_update_interval: 1
policy_freq: 2

lstm_sac_feature_dim: 64
lstm_sac_hidden_dim: 512
lstm_sac_feature_loss_weight: 1.0
lstm_sac_reconstruction_kl_weight: 0.5
