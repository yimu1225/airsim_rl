# Multimodal ST-Vim-SAC algorithm-specific parameters
# Per-step base-state tokens are fused with per-frame VisionMamba tokens before temporal Mamba.
ent_coef: 'auto'
target_entropy: auto
target_update_interval: 1
policy_freq: 1

# Vim + temporal Mamba encoder parameters.
# vmembed_dim controls frame-wise VisionMamba tokens.
# st_base_proj_dim controls the base-state token dimension.
# st_temporal_mamba_dim must equal vmembed_dim + st_base_proj_dim.
vmembed_dim: 64
st_temporal_mamba_dim: 96
st_mamba_depth: 1
st_mamba_patch_size: 32
st_mamba_d_state: 16
st_mamba_d_conv: 4
st_mamba_expand: 2
st_mamba_drop_rate: 0.05
st_mamba_drop_path_rate: 0.05
st_mamba_temporal_depth: 1
vmflatten_all_tokens: true

# Base-state token dimension before concatenating with visual tokens.
st_base_proj_dim: 32
