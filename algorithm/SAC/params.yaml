# SAC algorithm-specific parameters
# Use SB3-style ent_coef: can be a float (fixed) or a string 'auto' / 'auto_<init_value>'
ent_coef: 'auto'  # use 'auto' to learn entropy coefficient, or a float value to fix it
alpha_lr: 5e-5  # alpha/entropy coefficient optimizer learning rate
target_entropy: auto  # auto -> use SB3 heuristic -action_dim; can set to a float to override
target_update_interval: 1  # SB3-style critic target update interval, in gradient steps
policy_freq: 1  # SAC/SB3 updates actor every gradient step
