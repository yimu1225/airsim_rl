# ST_Vim_SAC_Beta algorithm-specific parameters
beta_concentration_offset: 1.0
beta_concentration_eps: 1.0e-6

# SAC parameters aligned with SB3-style defaults where practical.
ent_coef: 'auto'
target_entropy: auto
alpha_lr: 7.0e-5
target_update_interval: 1
policy_freq: 2

# Vim + temporal Mamba visual encoder parameters, matching ST_Vim_TD3.
st_mamba_embed_dim: 64
st_mamba_depth: 1
st_mamba_patch_size: 32
st_mamba_d_state: 32
st_mamba_d_conv: 4
st_mamba_expand: 2
st_mamba_drop_rate: 0.05
st_mamba_drop_path_rate: 0.05
st_mamba_temporal_depth: 1
st_vim_concat_cls_before_temporal_mamba: false
st_vim_flatten_all_tokens: true
