# PL-ST-Vim-PPO algorithm-specific parameters
rollout_buffer_size: 2048  # PPO 每轮 rollout 采样步数
ppo_epochs: 10  # PPO 每轮数据重复优化轮数
ppo_batch_size: 64  # PPO 小批量大小
clip_range: 0.2  # PPO policy clip epsilon
clip_range_vf: null  # value clip 范围；null 表示不裁剪
normalize_advantage: true  # 是否标准化 advantage
vf_coef: 0.5  # value loss 权重
ent_coef: 0.0  # entropy loss 权重
target_kl: null  # 目标 KL 阈值；null 表示不提前停止
gae_lambda: 0.95  # GAE lambda
lr: 0.0007  # PPO optimizer 学习率
max_grad_norm: 0.5  # PPO 梯度裁剪阈值
privileged_key: clean_depth  # 兼容旧配置；SB3入口会强制使用 clean_base + clean_depth

# Vim + temporal Mamba visual encoder parameters, matching ST_Vim_PPO.
st_mamba_embed_dim: 64  # VisionMamba 每帧 CLS/token 嵌入维度
st_mamba_depth: 1  # VisionMamba block 层数
st_mamba_patch_size: 16  # 深度图 2D patch 尺寸
st_mamba_d_state: 32  # VisionMamba/Mamba 状态维度 d_state
st_mamba_d_conv: 4  # Mamba 局部卷积宽度 d_conv
st_mamba_expand: 2  # Mamba 通道扩展倍数
st_mamba_drop_rate: 0.05  # VisionMamba dropout 概率
st_mamba_drop_path_rate: 0.05  # VisionMamba drop-path 概率
st_mamba_temporal_depth: 1  # 时序 Mamba 堆叠层数
st_vim_concat_cls_before_temporal_mamba: false  # 是否先拼接多帧 CLS 再输入 Temporal Mamba
st_vim_flatten_all_tokens: true  # 是否展平所有时序 token 作为视觉表示
