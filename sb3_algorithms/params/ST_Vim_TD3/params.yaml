# ST_VimTD3 algorithm-specific parameters
# Shared/common parameters stay in config.py
st_mamba_embed_dim: 64  # ST-Mamba/Vim token 嵌入维度
st_mamba_depth: 1  # Vim 主干 block 层数
st_mamba_patch_size: 16  # 2D patch 尺寸（像素）
st_mamba_d_state: 32  # ST-Mamba 的状态维度 d_state
st_mamba_d_conv: 4  # ST-Mamba 的局部卷积宽度 d_conv
st_mamba_expand: 2  # ST-Mamba 的通道扩展倍数 expand
st_mamba_drop_rate: 0.05  # ST-Mamba dropout 概率
st_mamba_drop_path_rate: 0.05  # ST-Mamba drop-path 概率
st_mamba_temporal_depth: 1  # ST-Mamba 时序堆叠层数
st_vim_concat_cls_before_temporal_mamba: false  # true: 先拼接多帧CLS，再按标量维度切成T*D个token输入TemporalMamba (形状: B,T*D,1)
st_vim_flatten_all_tokens: true  # 是否展平所有时序 token 作为策略/价值输入
